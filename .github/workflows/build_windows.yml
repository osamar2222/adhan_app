# Build Flutter Windows app (.exe) using GitHub Actions
# This runs on GitHub's Windows servers so you don't need Windows yourself
name: Build Windows (.exe)

on:
  # Trigger manually from GitHub Actions tab
  workflow_dispatch:
  # Or automatically when pushing to main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ✅ Verify Windows support
        run: flutter config --enable-windows-desktop

      - name: 🏗️ Build Windows release
        run: flutter build windows --release

      - name: 📤 Upload artifact (the .exe)
        uses: actions/upload-artifact@v4
        with:
          name: adhan_app_windows
          path: build\windows\x64\runner\Release\
          compression-level: 9
